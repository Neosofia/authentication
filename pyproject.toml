[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pdc-authentication"
version = "0.1.6"
description = "PDC Authentication Service - Token issuance and introspection"
requires-python = ">=3.12"
authors = [{ name = "PDC Team", email = "platform@pdc.local" }]

dependencies = [
    "flask>=3.0.0",
    "flask-limiter>=3.5.0",
    "flask-wtf>=1.2.0",
    "flask-talisman>=1.1.0",
    "workos>=1.0.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pyjwt[cryptography]>=2.8.0",
    "bcrypt>=4.1.0",
    "httpx>=0.25.0",
    "pydantic-settings>=2.0.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "boto3>=1.34.0",
    "logenvelope",
    "authentication-in-the-middle",
]

[tool.uv.sources]
logenvelope = { url = "https://github.com/Neosofia/sdk/releases/download/logenvelope-0.1.0/logenvelope-0.1.0-py3-none-any.whl" }
authentication-in-the-middle = { url = "https://github.com/Neosofia/sdk/releases/download/authentication-in-the-middle-0.2.0/authentication_in_the_middle-0.2.0-py3-none-any.whl" }

[dependency-groups]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=7.0.0",
    "testcontainers>=3.7.0",
    "respx>=0.21.0",
    "moto>=4.2.0",
    "requests>=2.33.0",
    "jsonschema>=4.20.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.coverage.run]
omit = ["*/migrations/*", "src/routes/ui.py"]

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.hatch.metadata]
allow-direct-references = true
