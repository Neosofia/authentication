# Build and push the authentication service image to GHCR.
#
# Triggered by:
#   - Push of a SemVer tag (authentication/vMAJOR.MINOR.PATCH)
#   - Manual dispatch
#
# Produces:
#   ghcr.io/neosofia/authentication:<git-sha>       — every run
#   ghcr.io/neosofia/authentication:vMAJOR.MINOR.PATCH — tagged releases
#
# Tagging convention: authentication/vMAJOR.MINOR.PATCH
#   git tag -a authentication/v1.2.3 -m "authentication v1.2.3" && git push origin authentication/v1.2.3

name: authentication-build-push

on:
  push:
    tags:
      - 'authentication/*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    uses: Neosofia/platform-workflows/.github/workflows/_test-python.yml@main

  scan:
    name: Vulnerability Scan
    uses: Neosofia/platform-workflows/.github/workflows/_scan.yml@main

  build-push:
    name: Build & Push to GHCR
    needs: [test, scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/neosofia/authentication
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=authentication/(.*),group=1

      - name: Build and push authentication image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=authentication-prod
          cache-to: type=gha,scope=authentication-prod,mode=max
