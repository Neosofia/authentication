# Build and push the authentication service image to GHCR.
#
# Triggered by:
#   - Push of a SemVer tag (authentication/vMAJOR.MINOR.PATCH)
#   - Manual dispatch
#
# Produces:
#   ghcr.io/neosofia/authentication:<git-sha>       — every run
#   ghcr.io/neosofia/authentication:vMAJOR.MINOR.PATCH — tagged releases
#
# Tagging convention: authentication/vMAJOR.MINOR.PATCH
#   git tag -a authentication/v1.2.3 -m "authentication v1.2.3" && git push origin authentication/v1.2.3

name: authentication-build-push

on:
  push:
    tags:
      - 'authentication/*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    uses: ./.github/workflows/authentication-_test.yml

  scan:
    name: Vulnerability Scan
    uses: ./.github/workflows/authentication-_scan.yml

  build-push:
    name: Build & Push to GHCR
    needs: [test, scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/neosofia/authentication
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=authentication/(.*),group=1

      - name: Build and push authentication image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pdc-authentication-prod
          cache-to: type=gha,scope=pdc-authentication-prod,mode=max
