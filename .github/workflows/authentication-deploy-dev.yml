# Deploy the authentication service to the dev LXC (CT 120) on Proxmox.
#
# Triggered automatically after Authentication Service — Build & Push succeeds
# on a CalVer tag (authentication/YYYY.MM.DD), or manually via workflow_dispatch.
#
# How it works:
#   The deploy job runs on the self-hosted GitHub Actions runner registered
#   inside CT 120 (label: authentication). The runner polls GHA outbound — no
#   inbound firewall holes required. It:
#     1. Pulls the tagged image from GHCR (runner already inside the CT)
#     2. Retags to :latest (docker-compose.cloud.yml sets pull_policy: never)
#     3. docker compose up -d --force-recreate --no-deps authentication
#     4. Health-checks /api/health until it responds or times out
#
# Pre-requisites:
#   - A self-hosted runner provisioned via infrastructure/proxmox/create-ct.sh
#     with labels: self-hosted, authentication
#     Registered against the neosofia org runner pool.
#   - GitHub environment "authentication-dev" must exist (can be empty).
#
# Optional secrets (environment: authentication-dev, only if GHCR is private):
#   GHCR_TOKEN   — fine-grained PAT with read:packages scope
#   GHCR_USER    — GitHub username that owns the PAT
#
# Note: secrets are NOT needed for deployment because the runner runs inside
# the CT as root and has direct access to Docker and /etc/authentication/aws.env.

name: authentication-deploy-dev

on:
  workflow_call:
    inputs:
      image_tag:
        description: "CalVer tag to deploy (e.g. 2026.04.23)"
        required: false
        type: string

jobs:
  deploy-dev:
    name: Deploy to CT 120 (dev)
    # Runs on the self-hosted runner registered inside the authentication CT.
    # Registered at org level — no SSH or PVE credentials needed.
    runs-on: [self-hosted, authentication]
    environment: authentication-dev

    # Skip if triggered by a failed build-push run
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Clean workspace
        run: sudo find "${{ github.workspace }}" -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            python3 /opt/neosofia/scripts/resolve-image-tag.py \
              "${{ github.event.workflow_run.head_sha }}" \
              "${{ github.repository }}" \
              "${{ github.token }}" \
              "authentication"
          fi

      - name: Deploy
        if: steps.tag.outputs.value != ''
        run: |
          bash /opt/neosofia/scripts/deploy.sh \
            "authentication" \
            "${{ steps.tag.outputs.value }}" \
            "${{ github.repository }}"
