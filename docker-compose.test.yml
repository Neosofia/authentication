# Test overlay — combine with base:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build --wait
#
# Env: tests/docker-compose.test.env.sample (shared by auth-postgres and authentication)

services:
  auth-postgres:
    env_file: tests/docker-compose.test.env.sample
    ports: []
    volumes: []

  authentication:
    env_file: ${TEST_ENV_FILE:-tests/docker-compose.test.env.sample}
    volumes: []
    healthcheck:
      interval: 5s
      retries: 15
      start_period: 15s
