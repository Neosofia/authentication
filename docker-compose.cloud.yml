# Overlay for deployed cloud environments (dev, staging).
#
# Always combine with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#
# What changes vs local-dev:
#   auth-postgres : bind-mount for backup, credentials from env file, no host port exposed
#   authentication: pre-built GHCR image, no source mounts, restart + healthcheck
#
# Secrets source: secrets service; checked out to /etc/authentication/env by deploy.sh
# Data paths:     /var/lib/authentication/postgres (bind-mounted)

services:
  auth-postgres:
    pull_policy: always
    restart: unless-stopped
    env_file: /etc/authentication/env
    ports: []
    volumes:
      - /var/lib/authentication/postgres:/var/lib/postgresql

  authentication:
    build: ~
    image: ghcr.io/neosofia/authentication:latest
    pull_policy: never
    restart: unless-stopped
    depends_on:
      auth-postgres:
        condition: service_healthy
    env_file: /etc/authentication/env
    ports:
      - "8014:8014"
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8014/api/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
