services:
  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: dev_only
    ports:
      - "5014:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentication:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authentication
    env_file:
      - path: .env
        required: false
    environment:
      ENV: development  # intentional — enables debug mode and disables Talisman/ProxyFix for local dev
    ports:
      - "8014:8014"
    depends_on:
      auth-postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
      - ./templates:/app/src/templates
      - ./static:/app/static
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request, sys; resp=urllib.request.urlopen('http://127.0.0.1:8014/api/health', timeout=5); sys.exit(0 if resp.status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  auth_postgres_data:
