services:
  auth-postgres:
    image: postgres:18
    container_name: auth-postgres
    env_file:
      - .env.postgres.example
      - path: .env.postgres
        required: false
    ports:
      - "5014:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentication-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authentication-migrate
    env_file:
      - path: .env
        required: false
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      auth-postgres:
        condition: service_healthy
    restart: "no"

  authentication:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authentication
    env_file:
      - path: .env
        required: false
    ports:
      - "8014:8014"
    depends_on:
      auth-postgres:
        condition: service_healthy
      authentication-migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
      - ./templates:/app/src/templates
      - ./static:/app/static
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request, sys; resp=urllib.request.urlopen('http://127.0.0.1:8014/api/health', timeout=5); sys.exit(0 if resp.status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  auth_postgres_data:
