[[services]]
name = "postgres"
source.image = "ghcr.io/railwayapp-templates/postgres-ssl:18"

[[services.volumes]]
mountPath = "/var/lib/postgresql/data"

[services.variables]
PGPORT = "5432"
PGDATABASE = "${{POSTGRES_DB}}"
PGUSER = "${{POSTGRES_USER}}"
PGPASSWORD = "${{POSTGRES_PASSWORD}}"
POSTGRES_DB = "auth"
POSTGRES_USER = "auth"
POSTGRES_PASSWORD = "${{secret()}}"

# Authentication service (this repo). Migrations run once per deploy via preDeployCommand,
# not on every container start — see Dockerfile CMD and F12 in audit.md.
[deploy]
preDeployCommand = ["python -m alembic upgrade head"]
